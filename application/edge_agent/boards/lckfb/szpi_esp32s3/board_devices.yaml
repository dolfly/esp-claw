version: 1.0.0
devices:
  - name: io_expander
    chip: pca9557
    type: custom
    init_skip: false
    config:
      i2c_addr: 0x32
      frequency: 400000
    peripherals:
      - name: i2c_master

  - name: display_lcd
    type: display_lcd
    sub_type: spi
    version: default
    chip: st7789
    config:
      mirror_x: true
      mirror_y: false
      swap_xy: true
      invert_color: true
      x_max: 320
      y_max: 240
      io_spi_config:
        cs_gpio_num: -1
        dc_gpio_num: 39
        spi_mode: 2
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: -1
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_RGB
        bits_per_pixel: 16
        data_endian: LCD_RGB_DATA_ENDIAN_LITTLE
        vendor_config: NULL
    peripherals:
      - name: spi_lcd

  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    peripherals:
      - name: ledc_backlight

  - name: lcd_touch
    chip: ft6336
    type: lcd_touch
    sub_type: i2c
    version: default
    dependencies:
      espressif/esp_lcd_touch_ft5x06: "*"
    config:
      touch_config:
        x_max: 320
        y_max: 240
        int_gpio_num: -1
        flags:
          swap_xy: false
          mirror_x: false
          mirror_y: false
    peripherals:
      - name: i2c_master
        i2c_addr: [0x70]

  - name: camera_power
    chip: pca9557
    type: custom
    config: {}

  - name: camera
    type: camera
    sub_type: dvp
    version: default
    config:
      dvp_config:
        reset_io: -1
        pwdn_io: -1
        vsync_io: 3
        de_io: 46
        pclk_io: 7
        xclk_io: 5
        xclk_freq: 24000000
        data_width: CAM_CTLR_DATA_WIDTH_8
        data_io:
          data_io_0: 16
          data_io_1: 18
          data_io_2: 8
          data_io_3: 17
          data_io_4: 15
          data_io_5: 6
          data_io_6: 4
          data_io_7: 9
          data_io_8: -1
          data_io_9: -1
          data_io_10: -1
          data_io_11: -1
          data_io_12: -1
          data_io_13: -1
          data_io_14: -1
          data_io_15: -1
    peripherals:
      - name: i2c_master
        frequency: 100000

  - name: imu_sensor
    chip: qmi8658
    type: custom
    version: 1.0.0
    init_skip: false
    config:
      i2c_addr: 0x6A
      frequency: 400000
    peripherals:
      - name: i2c_master

  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      mclk_enabled: true
    peripherals:
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 400000

  - name: audio_adc
    chip: es7210
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      dac_enabled: false
      adc_max_channel: 4
      adc_channel_mask: "0011"
      adc_init_gain: 0
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x82
        frequency: 400000

  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    version: default
    config:
      vfs_config:
        format_if_mount_failed: false
        max_files: 5
      sub_config:
        bus_width: 1
        pins:
          clk: 47
          cmd: 48
          d0: 21

  - name: boot_button
    type: gpio_ctrl
    version: default
    config:
      active_level: 0
      default_level: 1
    peripherals:
      - name: gpio_boot_button
