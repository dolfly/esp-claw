version: 1.0.0
peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 1
        scl: 2

  - name: spi_lcd
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        mosi_io_num: 40
        miso_io_num: -1
        sclk_io_num: 41
        max_transfer_sz: 25600

  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &i2s_config
      port: 0
      sample_rate_hz: 16000
      clk_src: I2S_CLK_SRC_DEFAULT
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      pins:
        mclk: 38
        bclk: 14
        ws: 13
        dout: 45
        din: 12
      invert_flags:
        mclk_inv: false
        bclk_inv: false
        ws_inv: false

  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config: *i2s_config

  - name: ledc_backlight
    type: ledc
    version: default
    config:
      gpio_num: 42
      speed_mode: LEDC_LOW_SPEED_MODE
      channel: 0
      timer_sel: 1
      freq_hz: 5000
      duty: 1023
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: true

  - name: gpio_boot_button
    type: gpio
    role: io
    config:
      pin: 0
      mode: GPIO_MODE_INPUT
      pull_up: true
